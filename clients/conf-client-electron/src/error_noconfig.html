<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Config Error</title>
  <style>
    html {
      touch-action: pan-x pan-y;
      -webkit-user-select: none;
      user-select: none;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1a1a1a;
      color: #e5e5e5;
      padding: 24px;
      text-align: center;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin: 0 0 8px 0;
      color: #fafafa;
    }
    p {
      margin: 0 0 24px 0;
      color: #a3a3a3;
      max-width: 360px;
    }
    button {
      padding: 10px 24px;
      font-size: 1rem;
      font-weight: 500;
      color: #fff;
      background: #3b82f6;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover {
      background: #2563eb;
    }
  </style>
</head>
<body>
  <h1>Config Erorr</h1>
  <p>The config file is missing or corrupted.</p> 
  <button type="button" id="reload-config-btn">Reload config</button>
  <script>
    document.getElementById('reload-config-btn').addEventListener('click', function () {
      if (window.electron && typeof window.electron.reloadConfig === 'function') {
        window.electron.reloadConfig();
      }
    });

    // Periodically try to reload configuration in case the file appears later
    setInterval(function () {
      if (window.electron && typeof window.electron.reloadConfig === 'function') {
        window.electron.reloadConfig();
      }
    }, 5 * 60 * 1000); // every 5 minutes
  </script>
</body>
</html>
