<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keyboard</title>
  <!-- simple-keyboard styles copied into dist as simple-keyboard.css -->
  <link rel="stylesheet" href="./simple-keyboard.css">
  <!-- Material Icons for toolbar buttons -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #f0f0f0;
    }
    #toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background-color: #222;
      color: #fff;
      height: 40px;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    #toolbar button {
      border: none;
      border-radius: 4px;
      padding: 6px 12px;
      margin-right: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    #toolbar-left button {
      background-color: #3b82f6;
      color: white;
    }
    #toolbar-right button {
      background-color: #4b5563;
      color: white;
    }
    #keyboard-container {
      width: 100%;
      height: calc(100% - 40px);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 8px 0;
      box-sizing: border-box;
    }
    /* Constrain simple-keyboard so it doesn't stretch edge-to-edge on large screens */
    .simple-keyboard {
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <div id="toolbar-left">
      <button id="btn-home">
        <span class="material-icons">home</span>
        <span>Home</span>
      </button>
    </div>
    <div id="toolbar-right">
      <button id="btn-toggle-keyboard">
        <span class="material-icons">keyboard</span>
        <span id="btn-toggle-keyboard-label">Show keyboard</span>
      </button>
    </div>
  </div>
  <div id="keyboard-container">
    <!-- simple-keyboard will render its keys into this element -->
    <div class="simple-keyboard"></div>
  </div>
  <script>
    // Use Electron's CommonJS loader so keyboard.js can use require/exports
    require('./keyboard.js');
  </script>
</body>
</html>
