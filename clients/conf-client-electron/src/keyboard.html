<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keyboard</title>
  <!-- simple-keyboard styles copied into dist as simple-keyboard.css -->
  <link rel="stylesheet" href="./simple-keyboard.css">
  <!-- Material Icons for toolbar buttons -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #f0f0f0;
    }
    #toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background-color: #222;
      color: #fff;
      height: 40px;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    #toolbar button {
      border: none;
      border-radius: 4px;
      padding: 6px 12px;
      margin-right: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    #toolbar-left button {
      background-color: #3b82f6;
      color: white;
    }
    #toolbar-right button {
      background-color: #4b5563;
      color: white;
    }
    #btn-language {
      margin-right: 12px;
    }
    #keyboard-container {
      width: 100%;
      height: calc(100% - 40px);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 8px 0;
      box-sizing: border-box;
    }
    /* Constrain simple-keyboard so it doesn't stretch edge-to-edge on large screens */
    .simple-keyboard {
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
    }

    /* Language popup */
    #language-popup {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background-color: rgba(0, 0, 0, 0.4);
      z-index: 10;
    }
    #language-popup.visible {
      display: flex;
    }
    #language-popup-content {
      background-color: #111827;
      color: #f9fafb;
      padding: 16px 20px;
      border-radius: 8px;
      min-width: 280px;
      max-width: 360px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    #language-popup-content h3 {
      margin: 0 0 12px 0;
      font-size: 16px;
      font-weight: 600;
    }
    .language-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 12px;
    }
    .lang-option {
      border: none;
      border-radius: 6px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 13px;
      text-align: left;
      background-color: #1f2937;
      color: #f9fafb;
    }
    .lang-option:hover {
      background-color: #374151;
    }
    .lang-en { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .lang-es { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .lang-fr { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .lang-de { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .lang-ru { font-family: system-ui, "Helvetica Neue", Arial, "Segoe UI", "Noto Sans", "Roboto", sans-serif; }
    .lang-ar { font-family: system-ui, "Geeza Pro", "Noto Naskh Arabic", "Arial", sans-serif; direction: rtl; text-align: right; }
    .lang-zh { font-family: system-ui, "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; }
    .lang-ja { font-family: system-ui, "Hiragino Kaku Gothic ProN", "Meiryo", "Noto Sans JP", sans-serif; }
    .lang-ko { font-family: system-ui, "Apple SD Gothic Neo", "Malgun Gothic", "Noto Sans KR", sans-serif; }

    #language-popup-close {
      border: none;
      border-radius: 6px;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 13px;
      background-color: #4b5563;
      color: #f9fafb;
      width: 100%;
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <div id="toolbar-left">
      <button id="btn-home">
        <span class="material-icons">home</span>
        <span>Home</span>
      </button>
    </div>
    <div id="toolbar-right">
      <button id="btn-language">
        <span class="material-icons">language</span>
        <span>Language</span>
      </button>
      <button id="btn-toggle-keyboard">
        <span class="material-icons">keyboard</span>
        <span id="btn-toggle-keyboard-label">Show keyboard</span>
      </button>
    </div>
  </div>
  <div id="keyboard-container">
    <!-- simple-keyboard will render its keys into this element -->
    <div class="simple-keyboard"></div>
  </div>
  <div id="language-popup">
    <div id="language-popup-content">
      <h3>Select keyboard language</h3>
      <div class="language-list" id="language-list"></div>
      <button id="language-popup-close">Close</button>
    </div>
  </div>
  <script>
    // Use Electron's CommonJS loader so keyboard.js can use require/exports
    require('./keyboard.js');
  </script>
</body>
</html>
